<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bala Widget Demo</title>
    <script src="/embed/v1/embed.js" defer></script>
    <style>
      body {
        font-family: "Segoe UI", Arial, sans-serif;
        background: #f8fafc;
        color: #0f172a;
        margin: 0;
        padding: 32px;
      }
      h1 {
        margin-bottom: 8px;
      }
      p {
        color: #475569;
      }
    </style>
  </head>
  <body>
    <h1>Bala Reader Demo</h1>
    <p>
      Add the script and drop the custom element wherever you want the player to
      appear.
    </p>

    <bala-reader
      url="https://collin-1.github.io/news.html"
      api-base=""
      theme="light"
      position="inline"
      rate="1.0"
    >
    </bala-reader>
  </body>
</html>
